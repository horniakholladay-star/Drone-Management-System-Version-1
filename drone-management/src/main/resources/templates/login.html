<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 — 无人机管理系统</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/3.3.7/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="container" style="max-width: 400px; margin-top: 100px;">
    <div class="panel panel-primary">
        <div class="panel-heading">
            <h3 class="panel-title text-center">
                <span class="glyphicon glyphicon-plane"></span> 无人机管理系统
            </h3>
        </div>
        <div class="panel-body">
            <!-- 错误提示 -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade in">
                <button type="button" class="close" data-dismiss="alert">&times;</button>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post" accept-charset="UTF-8">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" class="form-control" id="username"
                           name="username" placeholder="请输入用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" class="form-control" id="password"
                           name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <span class="glyphicon glyphicon-log-in"></span> 登录
                </button>
            </form>

            <hr>
            <p class="text-center text-muted small">
                默认账号: admin / admin123
            </p>
        </div>
    </div>
</div>

<script th:src="@{/webjars/jquery/3.4.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/3.3.7/js/bootstrap.min.js}"></script>
</body>
</html>
